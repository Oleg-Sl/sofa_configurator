<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Конфигуратор дивана</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <script type="module" crossorigin src="{{ url_for('static', path='/assets/index-IJNgd5jZ.js') }}"></script>
    <link rel="stylesheet" crossorigin href="{{ url_for('static', path='/assets/index-DIVDtYKz.css') }}">

    <script src="//api.bitrix24.com/api/v1/"></script>
</head>
<body>
    <div class="m-1">
        <div id="sofaConfigurator" class="container-fluid">
            <div class="row sofa-configurator__header">
                <div class="col-10 ">

                    <div class="d-flex sofa-configurator__tools">
                        <div class="sofa-configurator__tool_erase">
                            <button type="button" class="btn btn-light" id="sofaConfiguratorEraserToolButton" title="Ластик">
                                <i class="bi bi-eraser-fill"></i>
                            </button>
                        </div>

                        <div class="sofa-configurator__tool_text">
                            <button type="button" class="btn btn-light" id="sofaConfiguratorTextToolButton" title="Текст">
                                <i class="bi bi-fonts"></i>
                            </button>
                        </div>
                        
                        <div class="sofa-configurator__tool_erase">
                            <button type="button" class="btn btn-light" id="sofaConfiguratorArrowToolButton" title="Стрелка">
                                <i class="bi bi-arrows"></i>
                            </button>
                        </div>

                        <div class="sofa-configurator__tool_erase">
                            <button type="button" class="btn btn-light" id="sofaConfiguratorRightArrowToolButton" title="Правая стрелка">
                                <i class="bi bi-arrow-right"></i>
                            </button>
                        </div>

                        <div class="sofa-configurator__tool_color">
                            <input type="color" id="sofaConfiguratorColorPicker" value="#e66465" />
                        </div>

                        <div class="sofa-configurator__tool_align">
                            <button type="button" class="btn btn-light" id="sofaConfiguratorAlignToolButton" title="Центрировать">
                                <i class="bi bi-fullscreen"></i>
                            </button>
                        </div>

                        <div class="sofa-configurator__tool_erase">
                            <button type="button" class="btn btn-light" id="sofaConfiguratorPencilToolButton" title="Карандаш">
                                <i class="bi bi-pencil-fill"></i>
                            </button>
                        </div>

                        <div class="sofa-configurator__tool_clean">
                            <button type="button" class="btn btn-light" id="sofaConfiguratorCleanToolButton" title="Очистить холст">
                                <i class="bi bi-trash3-fill"></i>
                            </button>
                        </div>

                        <div class="sofa-configurator__tool_undo">
                            <button type="button" class="btn btn-light" id="sofaConfiguratorUndoToolButton" title="Отменить">
                                <i class="bi bi-chevron-left"></i>
                            </button>
                        </div>

                        <div class="sofa-configurator__tool_redo">
                            <button type="button" class="btn btn-light" id="sofaConfiguratorRedoToolButton" title="Повторить">
                                <i class="bi bi-chevron-right"></i>
                            </button>
                        </div>
    
                        <div>
                            <select class="form-select" name="" id="gridType">
                                <option value="">Нет</option>
                                <option value="line">Линии</option>
                                <option value="dot">Точки</option>
                            </select>
                        </div>
                        
                        <div class="flex-grow-1 ps-4 align-content-end sofa-configurator__scale-canvas-container">
                            <input type="range" class="form-range sofa-configurator__scale-control-input" min="50" max="200" id="sofaConfiguratorScaleCanvas" value="100">
                            <div class="label-percent-50">50%</div>
                            <div class="label-percent-100">100%</div>
                            <div class="label-percent-150">150%</div>
                            <div class="label-percent-200">200%</div>
                        </div>

                    </div>
                </div>

                <div class="col-2 sofa-configurator__catalog-modules-header">
                    <div class="col-auto" style="padding-right: 10px;">
                        <select id="sofaConfiguratorSelectCollecion" class="form-select form-select-sm sofa-configurator__collection-selector-select" aria-label="Выбор коллекции дивана">
                        </select>
                    </div>
                </div>
            </div>

            <div class="row sofa-configurator__body">
                <div class="col-10 p-0 sofa-configurator__canvas-container">
                    <canvas id="sofaConfiguratorCanvas" style="border: 1px solid #000;"></canvas>
                </div>

                <div class="col-2 d-flex flex-column sofa-configurator__catalog-module-library-container">
                    <div class="sofa-configurator__catalog-module-library-type-modules-container mb-2">
                        <div class="containter-buttons-type-modules">
                            <div class="containter-buttons-type-modules-left">
                                <div class="button-type-module-1-left-top">
                                    <button class="btn p-0" data-module-type-id="6695"><img src="{{ url_for('static', path='/assets/1_left_top.png') }}" alt="..."></button>
                                </div>
                            </div>

                            <div class="containter-buttons-type-modules-center">
                                <div class="button-type-module-2-center-top">
                                    <button class="btn p-0" data-module-type-id="6689"><img src="{{ url_for('static', path='/assets/2_center_top.png') }}" alt="..."></button>
                                </div>
                                <div></div>
                                <div class="containter-button-type-modules button-type-module-5-center-bottom">
                                    <button class="btn p-0" data-module-type-id="6697"><img class="button-type-module-5-center-bottom-img" src="{{ url_for('static', path='/assets/5_center_bottom.png') }}" alt="..."></button>
                                </div>
                            </div>

                            <div class="containter-buttons-type-modules-right">
                                <div class="button-type-module-3-right-top">
                                    <button class="btn p-0" data-module-type-id="6693"><img src="{{ url_for('static', path='/assets/3_right_top.png') }}" alt="..."></button>
                                </div>
                                <div class="button-type-module-4-right-bottom">
                                    <button class="btn p-0" data-module-type-id="6691"><img src="{{ url_for('static', path='/assets/4_right_bottom.png') }}" alt="..."></button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="sofa-configurator__catalog-module-library"></div>
                </div>
            </div>
        </div>
     </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
