<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Конфигуратор дивана</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <script type="module" crossorigin src="{{ url_for('static', path='/assets/index-B01kCwCF.js') }}"></script>
    <link rel="stylesheet" crossorigin ççhref="{{ url_for('static', path='/assets/index-BI95VNy_.css') }}">

    <script src="//api.bitrix24.com/api/v1/"></script>
</head>
<body>
    <div class="m-1">
        <div id="sofaConfigurator" class="container-fluid">
            <div class="row sofa-configurator__header">
                <div class="col-10 ">
                    <div class="d-flex">
                        <div class="row g-3 align-items-center sofa-configurator__collection-selector">
                            <div class="col-auto">
                                <label for="sofaConfiguratorSelectCollecion" class="col-form-label sofa-configurator__collection-selector-label">Коллекция:</label>
                            </div>
                            <div class="col-auto">
                                <select id="sofaConfiguratorSelectCollecion" class="form-select form-select-sm sofa-configurator__collection-selector-select" aria-label="Выбор коллекции дивана">
                                </select>
                            </div>
                        </div>
                    </div>
                    <div class="d-flex sofa-configurator__tools">
                        <div class="sofa-configurator__tool_erase">
                            <button type="button" class="btn btn-light" id="sofaConfiguratorEraserToolButton" title="Ластик">
                                <i class="bi bi-eraser-fill"></i>
                            </button>
                        </div>
                        <div class="sofa-configurator__tool_text">
                            <button type="button" class="btn btn-light" id="sofaConfiguratorTextToolButton" title="Текст">
                                <i class="bi bi-fonts"></i>
                            </button>
                        </div>
                        
                        <div class="sofa-configurator__tool_erase">
                            <button type="button" class="btn btn-light" id="sofaConfiguratorArrowToolButton" title="Стрелка">
                                <i class="bi bi-arrows"></i>
                            </button>
                        </div>
                        <div class="sofa-configurator__tool_erase">
                            <button type="button" class="btn btn-light" id="sofaConfiguratorRightArrowToolButton" title="Правая стрелка">
                                <i class="bi bi-arrow-right"></i>
                            </button>
                        </div>
                        <div class="sofa-configurator__tool_color">
                            <input type="color" id="sofaConfiguratorColorPicker" value="#e66465" />
                        </div>
                        <div class="sofa-configurator__tool_align">
                            <button type="button" class="btn btn-light" id="sofaConfiguratorAlignToolButton" title="Центрировать">
                                <i class="bi bi-fullscreen"></i>
                            </button>
                        </div>
                        <div class="sofa-configurator__tool_erase">
                            <button type="button" class="btn btn-light" id="sofaConfiguratorPencilToolButton" title="Карандаш">
                                <i class="bi bi-pencil-fill"></i>
                            </button>
                        </div>
                        <div class="sofa-configurator__tool_clean">
                            <button type="button" class="btn btn-light" id="sofaConfiguratorCleanToolButton" title="Очистить холст">
                                <i class="bi bi-trash3-fill"></i>
                            </button>
                        </div>
                        <div class="sofa-configurator__tool_undo">
                            <button type="button" class="btn btn-light" id="sofaConfiguratorUndoToolButton" title="Отменить">
                                <i class="bi bi-chevron-left"></i>
                            </button>
                        </div>

                        <div class="sofa-configurator__tool_redo">
                            <button type="button" class="btn btn-light" id="sofaConfiguratorRedoToolButton" title="Повторить">
                                <i class="bi bi-chevron-right"></i>
                            </button>
                        </div>
                        
                        <div class="flex-grow-1 ps-4 align-content-end sofa-configurator__scale-canvas-container">
                            <input type="range" class="form-range sofa-configurator__scale-control-input" min="50" max="200" id="sofaConfiguratorScaleCanvas" value="100">
                            <div class="label-percent-50">50%</div>
                            <div class="label-percent-100">100%</div>
                            <div class="label-percent-150">150%</div>
                            <div class="label-percent-200">200%</div>
                        </div>

                    </div>
                </div>
                
                <div class="col-2 sofa-configurator__catalog-modules-header">
                    <div>
                        <label for="" class="col-form-label sofa-configurator__label-libraries">Модули:</label>
                    </div>
                </div>
            </div>

            <div class="row sofa-configurator__body">
                <div class="col-10 p-0 sofa-configurator__canvas-container">
                    <canvas id="sofaConfiguratorCanvas" style="border: 1px solid #000;"></canvas>
                </div>
                
                <div class="col-2 sofa-configurator__catalog-module-library"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
